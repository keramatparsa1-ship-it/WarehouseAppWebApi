<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <p>
        <a href="/swagger" target="_blank" style="color: #007bff; text-decoration: none; font-weight: bold;">
            نسخه مستندات فنی (Swagger UI) ↗
        </a>
    </p>
    <meta charset="UTF-8">
    <title>مدیریت انبارداری</title>
    <style>
        body {
            font-family: Tahoma;
            margin: 20px;
            background-color: #f4f4f4;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input, button {
            padding: 10px;
            margin: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #007bff;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>مدیریت محصولات انبار</h1>

        <!-- فرم ورودی -->
        <div>
            <input type="text" id="name" placeholder="نام محصول">
            <input type="text" id="sku" placeholder="SKU (کد کالا)">
            <input type="number" id="price" placeholder="قیمت">
            <input type="number" id="categoryId" placeholder="ID دسته‌بندی (مثلاً 1)">
            <button onclick="addProduct()" style="background-color: green; color: white;">ثبت محصول جدید</button>
        </div>

        <hr>

        <!-- بخش نمایش خروجی -->
        <button onclick="loadProducts()">بروزرسانی لیست محصولات</button>
        <table id="productTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>نام</th>
                    <th>SKU</th>
                    <th>قیمت</th>
                    <th>دسته بندی</th>
                </tr>
            </thead>
            <tbody>
                <!-- داده‌ها اینجا قرار می‌گیرند -->
            </tbody>
        </table>
    </div>

    <script>
        const apiUrl = '/api/Products';

        // تابع دریافت و نمایش خروجی
        async function loadProducts() {
            const response = await fetch(apiUrl);
            const products = await response.json();
            const tbody = document.querySelector('#productTable tbody');
            tbody.innerHTML = '';

            products.forEach(p => {
                tbody.innerHTML += `
                        <tr>
                            <td>${p.id}</td>
                            <td>${p.name}</td>
                            <td>${p.sku}</td>
                            <td>${p.price}</td>
                            <td>${p.categoryName}</td>
                        </tr>
                    `;
            });
        }

        // تابع ارسال ورودی به API
        async function addProduct() {
            const data = {
                name: document.getElementById('name').value,
                sku: document.getElementById('sku').value,
                price: parseFloat(document.getElementById('price').value),
                categoryId: parseInt(document.getElementById('categoryId').value)
            };

            const response = await fetch(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert('محصول با موفقیت ثبت شد');
                loadProducts(); // لیست را رفرش کن
            } else {
                alert('خطا در ثبت محصول. مطمئن شوید CategoryId معتبر است.');
            }
        }

        // بارگذاری اولیه
        loadProducts();
    </script>
</body>
</html>
